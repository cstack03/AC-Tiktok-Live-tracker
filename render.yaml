services:
  - type: web
    name: tiktok-live-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python tracker.py
    envVars:
      - key: TIKTOK_USERNAME
        sync: false
      - key: POLL_INTERVAL_SEC
        value: 60
      - key: POWERUP_TTL_DAYS
        value: 5
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-tracker-db
          property: connectionString

databases:
  - name: tiktok-tracker-db
    plan: free
